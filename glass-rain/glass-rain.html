<!DOCTYPE html>

<!--
  Title: Glass Rain · 琉璃化雨
  Tech: Three.js WebGL, FBO fluid simulation, touch-drag physics, GLSL shader
  Keywords: fluid simulation, glsl shader, three.js, webgl
  Features: 眼泪落尽，便见晴空
  Render: Three.js WebGL r128
  Audio: no
  Touch: yes
  Particles: N/A (GPU FBO)
  Standalone: yes, single HTML file, 1 CDN (Three.js r128)
  Repo: https://github.com/shasha1108/healing-visual-lab
-->
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>琉璃化雨 · 东方禅意疗愈</title>
    <!-- 严格遵循规则：引入思源宋体 (Noto Serif SC) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #E8EAE9;
            font-family: 'Noto Serif SC', 'Songti SC', serif;
            touch-action: none; /* 专为触摸交互设计 */
        }

        #canvas-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        /* 文本排版核心：文学感、极致留白与呼吸感 */
        .text-layer {
            position: absolute;
            width: 100%;
            text-align: center;
            z-index: 10;
            /* 字体颜色使用极深的黛紫，在磨砂玻璃上极具高级感 */
            color: #2C2830; 
            pointer-events: none;
            transition: opacity 2.5s ease-in-out;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.6); /* 柔和白光发光 */
        }

        .title {
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 15px; /* 规则：间距拉开，极致高级 */
            margin-bottom: 16px;
            margin-left: 15px; /* 补偿最后一个字的间距 */
        }

        .subtitle {
            font-size: 14.4px; /* 规则：主标题的 60% */
            font-weight: 300;
            color: rgba(44, 40, 48, 0.65);
            letter-spacing: 10px; /* 规则：间距 10 */
            margin-left: 10px;
        }

        /* 前段文案：中上方 */
        #phase-1 {
            top: 22%;
            opacity: 1;
        }

        /* 后段金句：正中央 */
        #phase-2 {
            top: 50%;
            transform: translateY(-50%);
            opacity: 0; /* 初始隐藏 */
        }
        
        body { cursor: crosshair; }
    </style>
</head>
<body>

    <!-- WebGL 容器 -->
    <div id="canvas-container"></div>

    <!-- 心理映射：前段执念 -->
    <div id="phase-1" class="text-layer">
        <div class="title">有些情绪</div>
        <div class="subtitle">需要被看见</div>
    </div>

    <!-- 心理映射：后段疏解 -->
    <div id="phase-2" class="text-layer">
        <div class="title">泪水落尽</div>
        <div class="subtitle">方见晴空</div>
    </div>

    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- ==================== GPU 水滴流体物理引擎 (Ping-Pong FBO) ==================== -->
    <script type="x-shader/x-vertex" id="ortho-vs">
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = vec4(position, 1.0);
        }
    </script>

    <script type="x-shader/x-fragment" id="sim-fs">
        uniform sampler2D tDiffuse;
        uniform vec2 uMouse;
        uniform vec2 uPrevMouse;
        uniform float uAspect;
        uniform float uIsDrawing;
        varying vec2 vUv;

        // 绘制连贯平滑的笔触线
        float line(vec2 p, vec2 a, vec2 b, float r) {
            vec2 pa = p - a, ba = b - a;
            float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);
            return smoothstep(r, r * 0.8, length(pa - ba * h));
        }

        void main() {
            vec2 uv = vUv;
            vec2 p = uv; p.x *= uAspect;
            vec2 m = uMouse; m.x *= uAspect;
            vec2 pm = uPrevMouse; pm.x *= uAspect;

            // 笔刷输入
            float brush = line(p, pm, m, 0.02) * uIsDrawing;
            float dropBrush = smoothstep(0.025, 0.0, length(p - m)) * uIsDrawing;

            // 读取上一帧状态
            vec4 state = texture2D(tDiffuse, uv);
            float wetness = state.r; // R通道: 擦除磨砂的清晰度(水迹)
            float water = state.g;   // G通道: 聚集成滴的实体水(质量)

            // 核心重力物理：读取正上方的水体，让水掉落下来
            float pixelY = 1.0 / 1024.0;
            // 水滴下落速度极具治愈感，不疾不徐
            float fallSpeed = 3.5; 
            float waterAbove = texture2D(tDiffuse, uv + vec2(0.0, pixelY * fallSpeed)).g;

            // 表面张力与挥发：侵蚀细小的水痕，让粗壮的水痕变成水滴
            float newWater = waterAbove - 0.006; 
            newWater = max(0.0, newWater);
            newWater = max(newWater, dropBrush); // 将手指按压处变为水滴源头

            // 擦过的痕迹留下水迹 (wetness)
            wetness = max(wetness, brush * 0.6);
            wetness = max(wetness, newWater); // 水滴滚过的地方也会变清晰

            // 水汽缓慢重新凝结 (模糊恢复)
            wetness *= 0.9995;

            // 屏幕底部水洼汇聚
            if (uv.y < 0.03) {
                newWater += waterAbove * 0.5;
                wetness = 1.0;
            }

            gl_FragColor = vec4(wetness, newWater, 0.0, 1.0);
        }
    </script>

    <!-- ==================== 磨砂玻璃与折射渲染着色器 ==================== -->
    <script type="x-shader/x-fragment" id="render-fs">
        uniform sampler2D tFluid;
        uniform float uTime;
        uniform float uGlobalClear;
        varying vec2 vUv;

        // --- 自然流体分形噪声 (FBM) ---
        float random(vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123); }
        float noise(vec2 st) {
            vec2 i = floor(st); vec2 f = fract(st);
            float a = random(i); float b = random(i + vec2(1.0, 0.0));
            float c = random(i + vec2(0.0, 1.0)); float d = random(i + vec2(1.0, 1.0));
            vec2 u = f * f * (3.0 - 2.0 * f);
            return mix(a, b, u.x) + (c - a)* u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
        }
        float fbm(vec2 st) {
            float v = 0.0; float a = 0.5;
            mat2 rot = mat2(cos(0.5), sin(0.5), -sin(0.5), cos(0.50));
            for (int i = 0; i < 5; ++i) {
                v += a * noise(st); st = rot * st * 2.0 + vec2(100.0); a *= 0.5;
            }
            return v;
        }

        // --- 提取治愈的背后色彩 (晴空/情绪) ---
        vec3 getBackground(vec2 uv) {
            vec2 q = vec2(fbm(uv * 2.0 + uTime * 0.03), fbm(uv * 2.0 + vec2(1.0)));
            vec2 r = vec2(fbm(uv * 2.0 + q + uTime * 0.02), fbm(uv * 2.0 + q - uTime * 0.02));
            float f = fbm(uv * 2.0 + r * 2.0);
            
            // 色彩心理学配置
            vec3 greyPurple = vec3(0.51, 0.47, 0.54); // 烟雨灰紫 (阴郁/包裹感)
            vec3 mintGreen  = vec3(0.68, 0.85, 0.80); // 薄荷绿 (生机/呼吸)
            vec3 peach      = vec3(0.95, 0.82, 0.78); // 浅桃色 (温暖/光芒)
            
            vec3 col = mix(greyPurple, mintGreen, smoothstep(0.1, 0.8, f));
            col = mix(col, peach, smoothstep(0.4, 1.0, r.y));
            col -= length(uv - 0.5) * 0.15; // 柔和暗角
            return col;
        }

        void main() {
            vec2 uv = vUv;
            vec4 fluid = texture2D(tFluid, uv);
            float wetness = max(fluid.r, uGlobalClear); // uGlobalClear: 心境放晴变量
            float droplet = fluid.g;

            // 计算水滴法线 (用于光学折射)
            vec2 px = 1.0 / vec2(1024.0, 1024.0);
            float gL = texture2D(tFluid, uv - vec2(px.x, 0.0)).g;
            float gR = texture2D(tFluid, uv + vec2(px.x, 0.0)).g;
            float gU = texture2D(tFluid, uv - vec2(0.0, px.y)).g;
            float gD = texture2D(tFluid, uv + vec2(0.0, px.y)).g;
            vec2 normal = vec2(gL - gR, gU - gD);

            // 1. 清晰背景 (被水擦过或折射的区域)
            vec2 refractUV = uv + normal * 1.5; // 强烈的水滴折射感
            vec3 clearColor = getBackground(refractUV);

            // 2. 磨砂玻璃层 (起雾效果)
            // 通过高频噪声扰动UV制造毛玻璃质感
            vec2 noiseUV = uv + (vec2(random(uv), random(uv+1.0)) - 0.5) * 0.025;
            vec3 frostColor = getBackground(noiseUV);
            frostColor = mix(frostColor, vec3(0.88, 0.90, 0.92), 0.65); // 蒙上一层冷灰白水汽

            // 3. 混合：依据湿润度
            float mask = smoothstep(0.01, 0.15, wetness);
            vec3 finalColor = mix(frostColor, clearColor, mask);

            // 4. 水滴的物理高光 (Specular)
            vec3 lightDir = normalize(vec3(0.5, 1.0, 0.5));
            vec3 viewDir = vec3(0.0, 0.0, 1.0);
            vec3 n3 = normalize(vec3(normal * 8.0, 1.0));
            float spec = pow(max(dot(reflect(-lightDir, n3), viewDir), 0.0), 35.0);
            
            finalColor += spec * smoothstep(0.05, 0.2, droplet) * 0.6; // 只在水滴中心产生高光

            gl_FragColor = vec4(finalColor, 1.0);
        }
    </script>

    <script>
        // ================= WebGL 架构初始化 =================
        const container = document.getElementById('canvas-container');
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // FBO流体不需要抗锯齿
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const scene = new THREE.Scene();

        // 铺满全屏的平面
        const geometry = new THREE.PlaneGeometry(2, 2);

        // ================= FBO Ping-Pong 设置 =================
        // 使用 HalfFloatType 以保证流体计算的高精度与丝滑物理表现
        const fboConfig = {
            width: 1024, height: 1024,
            format: THREE.RGBAFormat,
            type: THREE.HalfFloatType, 
            minFilter: THREE.LinearFilter,
            magFilter: THREE.LinearFilter,
            depthBuffer: false,
            stencilBuffer: false
        };
        let rtA = new THREE.WebGLRenderTarget(1024, 1024, fboConfig);
        let rtB = new THREE.WebGLRenderTarget(1024, 1024, fboConfig);

        const simMaterial = new THREE.ShaderMaterial({
            vertexShader: document.getElementById('ortho-vs').textContent,
            fragmentShader: document.getElementById('sim-fs').textContent,
            uniforms: {
                tDiffuse: { value: null },
                uMouse: { value: new THREE.Vector2(-999, -999) },
                uPrevMouse: { value: new THREE.Vector2(-999, -999) },
                uAspect: { value: window.innerWidth / window.innerHeight },
                uIsDrawing: { value: 0.0 }
            }
        });
        const simMesh = new THREE.Mesh(geometry, simMaterial);
        const simScene = new THREE.Scene();
        simScene.add(simMesh);

        // ================= 最终渲染设置 =================
        const renderMaterial = new THREE.ShaderMaterial({
            vertexShader: document.getElementById('ortho-vs').textContent,
            fragmentShader: document.getElementById('render-fs').textContent,
            uniforms: {
                tFluid: { value: null },
                uTime: { value: 0 },
                uGlobalClear: { value: 0.0 } // 心理映射核心变量：全屏放晴
            }
        });
        const renderMesh = new THREE.Mesh(geometry, renderMaterial);
        scene.add(renderMesh);

        // ================= 交互与疗愈心理逻辑 =================
        const mouse = new THREE.Vector2(-999, -999);
        const prevMouse = new THREE.Vector2(-999, -999);
        let isDrawing = false;
        
        let interactionDuration = 0; // 记录用户情感释放(交互)的时长
        let phaseChanged = false;
        let targetGlobalClear = 0.0;

        const phase1Text = document.getElementById('phase-1');
        const phase2Text = document.getElementById('phase-2');

        function updateMouse(clientX, clientY) {
            const x = clientX / window.innerWidth;
            const y = 1.0 - (clientY / window.innerHeight); // WebGL UV 翻转
            prevMouse.copy(mouse);
            mouse.set(x, y);
        }

        // 开始触摸/擦拭
        function onPointerDown(e) {
            isDrawing = true;
            simMaterial.uniforms.uIsDrawing.value = 1.0;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            updateMouse(clientX, clientY);
            prevMouse.copy(mouse); // 避免初始连线拉伸
        }

        // 移动
        function onPointerMove(e) {
            if (!isDrawing) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            updateMouse(clientX, clientY);
        }

        // 离开
        function onPointerUp() {
            isDrawing = false;
            simMaterial.uniforms.uIsDrawing.value = 0.0;
        }

        window.addEventListener('mousedown', onPointerDown);
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('mouseup', onPointerUp);
        window.addEventListener('touchstart', onPointerDown, { passive: false });
        window.addEventListener('touchmove', onPointerMove, { passive: false });
        window.addEventListener('touchend', onPointerUp);

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            simMaterial.uniforms.uAspect.value = window.innerWidth / window.innerHeight;
        });

        // ================= 渲染循环引擎 =================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // 1. 累加情感释放时长 (心理映射机制)
            if (isDrawing) interactionDuration += delta;

            // 当交互(疏导)时长超过 4 秒，情绪彻底化解，迎来晴空
            if (interactionDuration > 4.0 && !phaseChanged) {
                phaseChanged = true;
                phase1Text.style.opacity = '0'; // 执念散去
                targetGlobalClear = 1.0; // 触发整体雾气消散

                setTimeout(() => {
                    phase2Text.style.opacity = '1'; // 金句浮现
                }, 2000);
            }

            // 缓动推进放晴状态
            renderMaterial.uniforms.uGlobalClear.value += (targetGlobalClear - renderMaterial.uniforms.uGlobalClear.value) * 0.01;

            // 2. 更新物理引擎输入
            simMaterial.uniforms.uMouse.value.copy(mouse);
            simMaterial.uniforms.uPrevMouse.value.copy(prevMouse);

            // 3. Ping-Pong FBO 交替渲染
            simMaterial.uniforms.tDiffuse.value = rtA.texture;
            renderer.setRenderTarget(rtB);
            renderer.render(simScene, camera);

            // 交换 Render Targets
            let temp = rtA; rtA = rtB; rtB = temp;

            // 在物理步进后，将prev同步，确保断点处不会疯狂拉丝
            if(isDrawing) prevMouse.copy(mouse); 

            // 4. 最终屏幕渲染
            renderMaterial.uniforms.tFluid.value = rtA.texture;
            renderMaterial.uniforms.uTime.value = time;
            renderer.setRenderTarget(null); // 渲染回屏幕
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
