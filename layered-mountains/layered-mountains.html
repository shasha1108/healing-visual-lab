<!DOCTYPE html>

<!--
  Title: Layered Mountains · 青绿 · 层峦
  Summary: 基于 Three.js WebGL 构建的高密度粒子山水画渲染实验，将传统青绿山水解构为 250K+ 独立粒子，鼠标悬停时粒子散射如雾
  Tech: Three.js WebGL, 250K particles, layered landscape rendering, raycaster interaction
  Render: WebGL (Three.js)
  Audio: no
  Touch: no
  Dependencies: 1 (Three.js CDN)
  Repo: https://github.com/shasha1108/healing-visual-lab
-->
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青绿 · 层峦 (高密度分层版)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            /* 背景：更暖一点的宣纸色 */
            background-color: #F2F1E6; 
            font-family: 'KaiTi', serif;
        }
        canvas { display: block; }

        /* 纸纹：增加颗粒感，让画面不那么“数码” */
        .paper-texture {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            opacity: 0.5;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
        }

        #ui {
            position: absolute;
            top: 15%; right: 15%;
            writing-mode: vertical-rl;
            text-orientation: upright;
            color: #2F4F4F;
            pointer-events: none;
            z-index: 20;
            letter-spacing: 0.6em;
            font-size: 20px;
            font-weight: bold;
            opacity: 0.9;
        }
        .seal {
            width: 30px; height: 30px;
            border: 2px solid #8B0000;
            color: #8B0000;
            font-size: 10px;
            display: flex; align-items: center; justify-content: center;
            margin-top: 15px;
            writing-mode: horizontal-tb;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="paper-texture"></div>
    <div id="ui">
        <div>千里江山</div>
        <div style="font-size: 14px; opacity: 0.7; margin-right: 15px;">触之即散 · 聚散随缘</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- 核心 Shader -->
    <script type="x-shader/x-vertex" id="vShader">
        uniform float uTime;
        uniform vec2 uMouse;
        uniform float uHover;
        
        attribute float aSize;
        attribute vec3 aColor;
        attribute vec3 aOriginalPos;
        attribute float aRandom;
        // 0:水(流动), 1:山(静谧上升)
        attribute float aType; 

        varying vec3 vColor;
        varying float vAlpha;

        // 噪声函数
        float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
        float noise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            f = f*f*(3.0-2.0*f);
            return mix(mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x),
                       mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x), f.y);
        }

        void main() {
            vColor = aColor;
            vec3 pos = aOriginalPos;
            float n = noise(vec2(pos.x * 0.02, uTime * 0.5));

            // --- 1. 动态逻辑 ---
            if (aType < 0.5) { 
                // === 水 (Water) ===
                // 快速横向流动，且有波浪起伏
                float flow = mod(uTime * 5.0 + aRandom * 100.0, 100.0) - 50.0;
                // 稍微扰动 x，不让它看起来像传送带
                pos.x += sin(uTime + pos.y) * 2.0; 
                pos.y += sin(pos.x * 0.1 + uTime * 2.0) * 1.5; // 波浪
            } else {
                // === 山 (Mountain) ===
                // 极其缓慢的云雾感上升
                pos.y += sin(uTime * 0.5 + aRandom * 10.0) * 1.0;
                pos.x += cos(uTime * 0.3 + aRandom * 10.0) * 0.5;
            }

            // --- 2. 交互逻辑 (Disperse) ---
            float dx = pos.x - uMouse.x;
            float dy = pos.y - uMouse.y;
            float dist = sqrt(dx*dx + dy*dy);
            float radius = 45.0;

            if (dist < radius && uHover > 0.5) {
                float force = (radius - dist) / radius;
                force = pow(force, 2.5); // 强力推开
                
                // 飘散方向：加入随机噪声，像沙子被风吹散
                float randDir = (aRandom - 0.5) * 2.0;
                
                pos.x += (dx / dist) * force * 40.0 + randDir * 20.0 * force;
                pos.y += (dy / dist) * force * 40.0 + abs(randDir) * 20.0 * force; // 向上飘
                pos.z += force * 60.0; // 向屏幕外飞
                
                vAlpha = 1.0 - force * 0.5; // 变淡
            } else {
                vAlpha = 1.0;
            }

            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            
            // 粒子大小随距离变化，近大远小
            gl_PointSize = aSize * (300.0 / -mvPosition.z);
        }
    </script>

    <script type="x-shader/x-fragment" id="fShader">
        varying vec3 vColor;
        varying float vAlpha;

        void main() {
            // 绘制圆形粒子
            vec2 uv = gl_PointCoord - 0.5;
            float dist = length(uv);
            if (dist > 0.5) discard;

            // 水墨晕染边缘：中心实，边缘极其柔和
            float alpha = 1.0 - smoothstep(0.1, 0.5, dist);
            
            // 颜色混合：稍微降低不透明度，实现宣纸渗透感
            gl_FragColor = vec4(vColor, vAlpha * alpha * 0.85);
        }
    </script>

    <script>
        const scene = new THREE.Scene();
        // 雾气：根据层级设定，让远山自然隐没
        scene.fog = new THREE.FogExp2(0xF2F1E6, 0.0015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
        // 调整视角：平视偏俯，增强纵深感
        camera.position.set(0, 10, 160);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- 粒子系统 ---
        const particles = {
            count: 250000, // 25万粒子，高密度
            pos: [],
            orig: [],
            col: [],
            size: [],
            rand: [],
            type: []
        };

        // 配色方案 (中国传统色)
        const C_WATER = new THREE.Color(0x1B3242);   // 墨色 (深)
        const C_NEAR  = new THREE.Color(0x2B5F75);   // 黛蓝 (中深)
        const C_MID   = new THREE.Color(0x40826D);   // 石青 (中亮)
        const C_FAR   = new THREE.Color(0x8AB898);   // 石绿 (亮)

        // 辅助函数：生成粒子
        function addParticle(x, y, z, color, size, type) {
            particles.pos.push(x, y, z);
            particles.orig.push(x, y, z);
            particles.col.push(color.r, color.g, color.b);
            particles.size.push(size);
            particles.rand.push(Math.random());
            particles.type.push(type);
        }

        // --- 1. 构建底层：流动的江水 (Water Layer) ---
        // Z: 40 ~ 80
        for(let i=0; i<60000; i++) {
            const x = (Math.random() - 0.5) * 400;
            const z = 40 + Math.random() * 40;
            // 水面波动方程
            let y = -35 + Math.sin(x * 0.03) * 3.0 + Math.sin(z * 0.1) * 2.0;
            // 增加厚度
            y += (Math.random() - 0.5) * 8.0;

            addParticle(x, y, z, C_WATER, 1.5 + Math.random()*1.5, 0.0);
        }

        // --- 2. 构建中层：主峰 (Main Peak) ---
        // Z: 0 ~ 20
        for(let i=0; i<120000; i++) {
            const x = (Math.random() - 0.5) * 250;
            // 山形函数：高斯分布 + 噪声
            // 制造陡峭的主峰
            const peak = Math.exp(-Math.pow(x * 0.025, 2)) * 80; 
            const noise = Math.sin(x * 0.1) * 5 + Math.cos(x * 0.05) * 10;
            const height = peak + noise - 20;

            if (height < -30) continue; // 剔除太低的部分

            // 密度聚焦：粒子集中在表面，内部较少
            const z = (Math.random() - 0.5) * 20;
            const y = height - Math.random() * Math.random() * 60; // 上密下疏

            // 颜色渐变：山顶石青，山脚墨色
            const mixRatio = Math.min(1.0, (y + 30) / 80);
            const col = new THREE.Color().lerpColors(C_WATER, C_MID, mixRatio);

            addParticle(x, y, z, col, 2.0 + Math.random(), 1.0);
        }

        // --- 3. 构建远层：淡雅群山 (Distant Mountains) ---
        // Z: -60 ~ -40
        for(let i=0; i<70000; i++) {
            const x = (Math.random() - 0.5) * 400;
            // 远山：平缓连绵
            const height = Math.sin(x * 0.02) * 30 + Math.sin(x * 0.05) * 10 + 10;
            
            const z = -50 + (Math.random() - 0.5) * 20;
            const y = height - Math.random() * 50;

            // 颜色：石绿
            const col = C_FAR;

            addParticle(x, y, z, col, 3.0 + Math.random()*2.0, 1.0);
        }


        // --- 创建几何体与材质 ---
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(particles.pos, 3));
        geometry.setAttribute('aOriginalPos', new THREE.Float32BufferAttribute(particles.orig, 3));
        geometry.setAttribute('aColor', new THREE.Float32BufferAttribute(particles.col, 3));
        geometry.setAttribute('aSize', new THREE.Float32BufferAttribute(particles.size, 1));
        geometry.setAttribute('aRandom', new THREE.Float32BufferAttribute(particles.rand, 1));
        geometry.setAttribute('aType', new THREE.Float32BufferAttribute(particles.type, 1));

        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uMouse: { value: new THREE.Vector2(9999, 9999) },
                uHover: { value: 0 }
            },
            vertexShader: document.getElementById('vShader').textContent,
            fragmentShader: document.getElementById('fShader').textContent,
            transparent: true,
            depthWrite: false,
            blending: THREE.NormalBlending // 水墨不需要发光，用正常混合
        });

        const landscape = new THREE.Points(geometry, material);
        scene.add(landscape);


        // --- 交互与动画 ---
        const raycaster = new THREE.Raycaster();
        const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        const mouse = new THREE.Vector2();
        const targetV3 = new THREE.Vector3();

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(plane, targetV3);
            
            material.uniforms.uMouse.value.x = targetV3.x;
            material.uniforms.uMouse.value.y = targetV3.y;
            material.uniforms.uHover.value = 1;
        });
        
        window.addEventListener('mouseout', () => {
            material.uniforms.uHover.value = 0;
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.uTime.value = clock.getElapsedTime();
            
            // 镜头微动，增加空间呼吸感
            const t = clock.getElapsedTime();
            camera.position.x = Math.sin(t * 0.1) * 10;
            camera.lookAt(0, 5, 0);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
