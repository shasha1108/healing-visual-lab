<!DOCTYPE html>

<!--
  Title: Deep Blue Breath · 深蓝呼吸 V204
  Summary: 基于 Three.js WebGL + Web Audio API 构建的 25,000 粒子深蓝呼吸疗愈实验，通过按压进度驱动粒子从漩涡模式平滑过渡到金色上升治愈模式
  Tech: Three.js WebGL, 25K particle system, Web Audio API (rain noise + Fmaj7 chords), CSS animation
  Keywords: threejs, webgl, particle-system, 25k-particles, deep-blue, breath-responsive, vortex-to-healing, web-audio, fmaj7-chords, rain-noise, immersive-h5
  Render: WebGL (Three.js)
  Audio: yes
  Touch: yes
  Dependencies: 1 (Three.js CDN)
  Repo: https://github.com/shasha1108/healing-visual-lab
-->
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深蓝呼吸 V204 (沉浸慢速版)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000510;
            font-family: "Songti SC", "Noto Serif SC", serif;
            user-select: none;
            cursor: none; /* 隐藏系统鼠标 */
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* 1. 容器 */
        #card-container {
            position: relative;
            width: 100%; max-width: 540px;
            aspect-ratio: 3 / 4;
            max-height: 90vh;
            background: #000;
            box-shadow: 0 0 100px rgba(0, 50, 150, 0.2);
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            transition: box-shadow 3s ease;
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* 2. 灵性光标 */
        #spirit-cursor {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(100,200,255,0.8) 40%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 100;
            mix-blend-mode: screen;
            transition: width 0.5s, height 0.5s;
        }
        #spirit-halo {
            position: absolute; top: 50%; left: 50%;
            width: 60px; height: 60px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 99;
            animation: breathe 4s infinite ease-in-out;
        }
        @keyframes breathe { 0%,100%{transform:translate(-50%,-50%) scale(0.8); opacity:0.2} 50%{transform:translate(-50%,-50%) scale(1.2); opacity:0.5} }

        /* 3. 沉浸字幕 (移除操作提示) */
        #subtitle-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; pointer-events: none; z-index: 20; width: 100%;
        }
        .main-title {
            font-size: 26px; color: #fff; letter-spacing: 8px; font-weight: 300;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.8);
            opacity: 0; transform: translateY(10px); transition: all 1.5s ease-out;
            position: absolute; width: 100%; left: 0;
        }
        .main-title.active { opacity: 1; transform: translateY(0); }
        
        /* 4. 启动遮罩 */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; z-index: 60; transition: opacity 1.5s;
        }
        #start-btn {
            padding: 15px 50px; border: 1px solid rgba(255,255,255,0.6);
            background: transparent; color: #fff;
            font-size: 16px; letter-spacing: 6px; cursor: pointer;
            transition: 0.5s; font-family: inherit;
        }
        #start-btn:hover { background: rgba(255,255,255,0.2); letter-spacing: 8px; }
    </style>
</head>
<body>
    <div id="card-container">
        <div id="spirit-halo"></div>
        <div id="spirit-cursor"></div>

        <div id="subtitle-box">
            <div id="t1" class="main-title active">有时候<br>下坠并不意味着毁灭</div>
            <div id="t2" class="main-title">允许自己<br>在黑暗中停留片刻</div>
            <div id="t3" class="main-title" style="color:#ffd700; text-shadow:0 0 40px #ffaa00;">看<br>深渊的底部<br>是光升起的地方</div>
        </div>

        <div id="overlay">
            <button id="start-btn">开启体验</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- 0. 音频引擎 ---
        const AudioEngine = {
            ctx: null, master: null, rainFilter: null, rainGain: null, padGain: null,
            init() {
                if (this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.master = this.ctx.createGain();
                this.master.gain.value = 0.4;
                this.master.connect(this.ctx.destination);

                // 雨声
                const bSize = 2 * this.ctx.sampleRate;
                const buf = this.ctx.createBuffer(1, bSize, this.ctx.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < bSize; i++) data[i] = (Math.random()*2-1)*0.5;
                
                const rainSrc = this.ctx.createBufferSource();
                rainSrc.buffer = buf; rainSrc.loop = true; rainSrc.start(0);

                this.rainFilter = this.ctx.createBiquadFilter();
                this.rainFilter.type = 'lowpass';
                this.rainFilter.frequency.value = 400; 

                this.rainGain = this.ctx.createGain();
                this.rainGain.gain.value = 0.8;

                rainSrc.connect(this.rainFilter).connect(this.rainGain).connect(this.master);

                // 音乐
                const freqs = [261.63, 329.63, 392.00, 493.88]; 
                this.padGain = this.ctx.createGain();
                this.padGain.gain.value = 0; 
                this.padGain.connect(this.master);

                freqs.forEach(f => {
                    const osc = this.ctx.createOscillator();
                    osc.type = 'sine'; osc.frequency.value = f;
                    osc.start(); osc.connect(this.padGain);
                });
            },
            update(progress) {
                if(!this.ctx) return;
                const now = this.ctx.currentTime;
                const filterFreq = 400 + progress * 3000;
                const padVol = progress * 0.5;
                const rainVol = 0.8 - progress * 0.7;
                this.rainFilter.frequency.setTargetAtTime(filterFreq, now, 0.1);
                this.rainGain.gain.setTargetAtTime(rainVol, now, 0.1);
                this.padGain.gain.setTargetAtTime(padVol, now, 0.5);
            }
        };

        // --- 1. 场景 ---
        const container = document.getElementById('card-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000508);
        scene.fog = new THREE.FogExp2(0x000508, 0.002);

        const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 40, 0);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- 2. 材质 ---
        function createTex() {
            const c = document.createElement('canvas');
            c.width = 64; c.height = 64;
            const ctx = c.getContext('2d');
            const g = ctx.createRadialGradient(32,32,0, 32,32,32);
            g.addColorStop(0, 'rgba(255,255,255,1)');
            g.addColorStop(0.4, 'rgba(150,220,255,0.5)');
            g.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = g;
            ctx.fillRect(0,0,64,64);
            return new THREE.CanvasTexture(c);
        }

        // --- 3. 粒子系统 ---
        const COUNT = 25000; 
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(COUNT * 3);
        const col = new Float32Array(COUNT * 3);
        const size = new Float32Array(COUNT);
        const data = []; 

        const C_BLUE = {r:0.05, g:0.2, b:0.5};
        const C_GOLD = {r:1.0, g:0.9, b:0.5};

        for(let i=0; i<COUNT; i++) {
            const r = Math.random() * 60 + 2;
            const theta = Math.random() * Math.PI * 2;
            const x = r * Math.cos(theta);
            const z = r * Math.sin(theta);
            const y = - (60 - r) * Math.random() * 1.5; 

            pos[i*3] = x; pos[i*3+1] = y; pos[i*3+2] = z;
            
            col[i*3] = C_BLUE.r; col[i*3+1] = C_BLUE.g; col[i*3+2] = C_BLUE.b;
            
            size[i] = 3.0 + Math.random() * 3.0;

            data.push({
                r: r, theta: theta, y: y,
                // ★ 降速修正：速度大幅降低 ★
                speed: (0.005 + (1.0 - r/60) * 0.01) * 0.5, 
                upSpeed: 0.05 + Math.random() * 0.1
            });
        }

        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
        geo.setAttribute('size', new THREE.BufferAttribute(size, 1));

        const mat = new THREE.PointsMaterial({
            map: createTex(), size: 1.0, 
            vertexColors: true, transparent: true, opacity: 0.8,
            blending: THREE.AdditiveBlending, depthWrite: false
        });
        const system = new THREE.Points(geo, mat);
        scene.add(system);

        // --- 4. 交互逻辑 ---
        let isPressing = false;
        let progress = 0; 
        const cursor = document.getElementById('spirit-cursor');
        const halo = document.getElementById('spirit-halo');
        const containerRect = container.getBoundingClientRect();

        function moveCursor(clientX, clientY) {
            const x = clientX - containerRect.left;
            const y = clientY - containerRect.top;
            cursor.style.left = x + 'px'; cursor.style.top = y + 'px';
            halo.style.left = x + 'px'; halo.style.top = y + 'px';
        }
        container.addEventListener('mousemove', e => moveCursor(e.clientX, e.clientY));
        container.addEventListener('touchmove', e => {
            e.preventDefault();
            moveCursor(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive:false});

        const onDown = () => isPressing = true;
        const onUp = () => isPressing = false;
        document.addEventListener('mousedown', onDown);
        document.addEventListener('mouseup', onUp);
        document.addEventListener('touchstart', (e) => { e.preventDefault(); onDown(); }, {passive:false});
        document.addEventListener('touchend', onUp);

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('overlay').style.opacity = 0;
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 1000);
            AudioEngine.init();
        });

        function updateSubtitle(p) {
            const t1 = document.getElementById('t1');
            const t2 = document.getElementById('t2');
            const t3 = document.getElementById('t3');
            
            if (p < 0.3) {
                t1.classList.add('active'); t2.classList.remove('active'); t3.classList.remove('active');
            } else if (p >= 0.3 && p < 0.85) {
                t1.classList.remove('active'); t2.classList.add('active'); t3.classList.remove('active');
            } else {
                t1.classList.remove('active'); t2.classList.remove('active'); t3.classList.add('active');
            }
        }

        // --- 5. 动画循环 ---
        function animate() {
            requestAnimationFrame(animate);
            
            const targetP = isPressing ? 1.0 : 0.0;
            progress += (targetP - progress) * 0.02;

            updateSubtitle(progress);
            AudioEngine.update(progress);

            if(isPressing) {
                cursor.style.width = '40px'; cursor.style.height = '40px';
                cursor.style.background = 'radial-gradient(circle, #fff 0%, rgba(255,215,0,0.8) 40%, transparent 70%)';
                halo.style.borderColor = 'rgba(255,215,0,0.5)';
            } else {
                cursor.style.width = '20px'; cursor.style.height = '20px';
                cursor.style.background = 'radial-gradient(circle, #fff 0%, rgba(100,200,255,0.8) 40%, transparent 70%)';
                halo.style.borderColor = 'rgba(255,255,255,0.1)';
            }

            camera.position.y = 40 - progress * 100; 

            for(let i=0; i<COUNT; i++) {
                const p = data[i];
                
                if (progress < 0.9) {
                    // 漩涡模式：慢速旋转
                    p.theta += p.speed;
                    
                    pos[i*3] = p.r * Math.cos(p.theta);
                    pos[i*3+1] = p.y;
                    pos[i*3+2] = p.r * Math.sin(p.theta);
                    
                    col[i*3] = C_BLUE.r; col[i*3+1] = C_BLUE.g; col[i*3+2] = C_BLUE.b;
                    size[i] = 2.0;

                } else {
                    // 治愈模式：柔和上升
                    pos[i*3+1] += p.upSpeed;
                    
                    // ★ 关键：移除白闪，平滑过渡到金色
                    // 使用 Lerp 慢慢变金，而不是突变
                    col[i*3] += (C_GOLD.r - col[i*3]) * 0.05;
                    col[i*3+1] += (C_GOLD.g - col[i*3+1]) * 0.05;
                    col[i*3+2] += (C_GOLD.b - col[i*3+2]) * 0.05;
                    
                    // 螺旋上升扩散
                    p.theta += 0.005; 
                    const r = p.r * 1.5;
                    pos[i*3] = r * Math.cos(p.theta);
                    pos[i*3+2] = r * Math.sin(p.theta);
                    
                    if(pos[i*3+1] > 40) pos[i*3+1] = -80;
                    
                    size[i] = 4.0;
                }
            }

            geo.attributes.position.needsUpdate = true;
            geo.attributes.color.needsUpdate = true;
            geo.attributes.size.needsUpdate = true;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(container.clientWidth, container.clientHeight);
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
