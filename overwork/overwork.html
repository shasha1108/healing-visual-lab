    function setup() {
      const canvas = createCanvas(BASE_W, BASE_H);
      canvas.parent("pixel-stage");
      pixelDensity(Math.min(window.devicePixelRatio || 1, 2));
      smooth();
      drawingContext.imageSmoothingEnabled = true;
      sizeStage();
      initRestlessMotes();
      initThoughtFragments();

      document.getElementById("interact-layer").addEventListener("pointerdown", handlePointerDown);
    }

    function sizeStage() {
      const stage = document.getElementById("pixel-stage");
      const scale = Math.min(windowWidth / BASE_W, windowHeight / BASE_H);
      stage.style.width = `${Math.floor(BASE_W * scale)}px`;
      stage.style.height = `${Math.floor(BASE_H * scale)}px`;
      stage.style.setProperty("--stage-scale", scale);
    }

    function windowResized() {
      sizeStage();
    }

    function handleVisibilityChange() {
      if (document.hidden) noLoop();
      else loop();
    }

    function initRestlessMotes() {
      const directions = [
        [-0.92, 0.39], [0.73, -0.68], [0.96, 0.28], [-0.58, -0.81],
        [0.45, 0.89], [-0.85, -0.52], [0.67, 0.74], [-0.98, 0.18]
      ];
      const speeds = [82, 104, 92, 116, 88, 110, 98];
      motes.forEach((mote, index) => {
        const direction = directions[index % directions.length];
        const speed = speeds[index % speeds.length];
        mote.vx = direction[0] * speed;
        mote.vy = direction[1] * speed;
        mote.energy = 0;
        mote.hold = 0;
        mote.restTime = 0;
        mote.state = "RESTLESS";
      });
    }

    function initThoughtFragments() {
      const layer = document.getElementById("phrase-layer");
      for (const fragment of thoughtFragments) {
        const element = document.createElement("span");
        element.className = `thought-fragment${fragment.warm ? " thought-fragment--warm" : ""}`;
        element.textContent = fragment.text;
        layer.appendChild(element);
        fragment.element = element;
        fragment.energy = 0;
        fragment.dissolve = 0;
        fragment.state = "RESTLESS";
      }
      renderThoughtFragments();
    }

    function handlePointerDown(event) {
      event.preventDefault();
      if (motion.mode !== "RESTLESS") return;
      const stage = document.getElementById("pixel-stage");
      const rect = stage.getBoundingClientRect();
      const x = (event.clientX - rect.left) * (BASE_W / rect.width);
      const y = (event.clientY - rect.top) * (BASE_H / rect.height);
      if (!isPointInEchoBox(x, y)) return;
      document.getElementById("pixel-stage").classList.add("has-started");
      triggerSurge(x, y);
    }

    function triggerSurge(x, y) {
      motion.mode = "SURGE";
      motion.elapsed = 0;
      motion.touchX = x;
      motion.touchY = y;
      motion.quietGlow = 0;
      motion.quietElapsed = 0;
      for (const mote of motes) {
        const distance = Math.hypot(mote.x - x, mote.y - y);
        mote.surgeDelay = Math.min(distance / 620, motion.maxDelay);
        mote.surgeStrength = Math.max(0.14, 1 - distance / 360);
        mote.surgeX = mote.x;
        mote.surgeY = mote.y;
        mote.hold = motion.duration + mote.surgeDelay;
        mote.state = "WAITING_FOR_SURGE";
      }
      for (const fragment of thoughtFragments) {
        const distance = Math.hypot(fragment.x - x, fragment.y - y);
        fragment.surgeDelay = Math.min(distance / 620, motion.maxDelay);
        fragment.surgeStrength = Math.max(0.2, 1 - distance / 380);
        fragment.surgeX = fragment.x;
        fragment.surgeY = fragment.y;
        fragment.energy = 0;
        fragment.dissolve = 0;
        fragment.state = "WAITING_FOR_SURGE";
      }
    }

    function defineEchoBoxPath(ctx) {
      ctx.beginPath();
      ctx.moveTo(ECHO_PATH.start[0], ECHO_PATH.start[1]);
      for (const curve of ECHO_PATH.curves) {
        ctx.bezierCurveTo(
          curve[0][0], curve[0][1],
          curve[1][0], curve[1][1],
          curve[2][0], curve[2][1]
        );
      }
      ctx.closePath();
    }

    function buildEchoCollisionPolygon(path, stepsPerCurve) {
      const points = [[path.start[0], path.start[1]]];
      let from = path.start;
      for (const curve of path.curves) {
        const controlA = curve[0];
        const controlB = curve[1];
        const to = curve[2];
        for (let step = 1; step <= stepsPerCurve; step += 1) {
          const t = step / stepsPerCurve;
          const u = 1 - t;
          points.push([
            u * u * u * from[0]
              + 3 * u * u * t * controlA[0]
              + 3 * u * t * t * controlB[0]
              + t * t * t * to[0],
            u * u * u * from[1]
              + 3 * u * u * t * controlA[1]
              + 3 * u * t * t * controlB[1]
              + t * t * t * to[1]
          ]);
        }
        from = to;
      }
      return points;
    }

    function isPointInEchoBox(x, y) {
      let inside = false;
      for (let index = 0, previous = ECHO_COLLISION_POLYGON.length - 1;
        index < ECHO_COLLISION_POLYGON.length;
        previous = index, index += 1) {
        const currentPoint = ECHO_COLLISION_POLYGON[index];
        const previousPoint = ECHO_COLLISION_POLYGON[previous];
        const crosses = (currentPoint[1] > y) !== (previousPoint[1] > y)
          && x < (previousPoint[0] - currentPoint[0])
            * (y - currentPoint[1])
            / (previousPoint[1] - currentPoint[1])
            + currentPoint[0];
        if (crosses) inside = !inside;
      }
      return inside;
    }

    function withEchoBoxClip(ctx, drawInside) {
      ctx.save();
      defineEchoBoxPath(ctx);
      ctx.clip();
      drawInside();
      ctx.restore();
    }

      fill(159, 220, 230, 44);
      circle(48, 346, 3);
      circle(490, 548, 3);
      fill(255, 117, 106, 52);
      circle(474, 320, 4);
      ctx.restore();
    }

    function drawBackGlass(ctx) {
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      const ambientHalo = ctx.createRadialGradient(GLASS.centerX, 448, 116, GLASS.centerX, 448, 322);
      ambientHalo.addColorStop(0, "rgba(84,199,217,0.10)");
      ambientHalo.addColorStop(0.58, "rgba(84,199,217,0.035)");
      ambientHalo.addColorStop(1, "rgba(84,199,217,0)");
      ctx.fillStyle = ambientHalo;
      ctx.fillRect(18, 126, 504, 650);
      ctx.restore();

      ctx.save();
      defineEchoBoxPath(ctx);
      const glassFill = ctx.createRadialGradient(214, 318, 26, 286, 454, 352);
      glassFill.addColorStop(0, "rgba(216,243,246,0.10)");
      glassFill.addColorStop(0.46, "rgba(31,104,117,0.09)");
      glassFill.addColorStop(1, "rgba(2,14,22,0.25)");
      ctx.fillStyle = glassFill;
      ctx.fill();

      ctx.shadowColor = "rgba(84,199,217,0.32)";
      ctx.shadowBlur = 18;
      ctx.lineWidth = 5;
      ctx.strokeStyle = "rgba(112,216,240,0.30)";
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.lineWidth = 1.25;
      ctx.strokeStyle = "rgba(226,246,249,0.64)";
      ctx.stroke();
      ctx.restore();

      ctx.save();
      defineEchoBoxPath(ctx);
      ctx.clip();
      defineEchoBoxPath(ctx);
      ctx.lineWidth = 18;
      ctx.strokeStyle = "rgba(1,10,16,0.20)";
      ctx.stroke();
      ctx.restore();
    }

    function drawInterior(ctx) {
      withEchoBoxClip(ctx, () => {
        const wash = ctx.createLinearGradient(0, GLASS.topY, 0, GLASS.bottomY);
        wash.addColorStop(0, "rgba(12,39,49,0.34)");
        wash.addColorStop(0.48, "rgba(4,24,32,0.16)");
        wash.addColorStop(1, "rgba(31,104,117,0.16)");
        ctx.fillStyle = wash;
        ctx.fillRect(GLASS.left, GLASS.topY, GLASS.right - GLASS.left, GLASS.bottomY - GLASS.topY);

        const innerDepth = ctx.createRadialGradient(238, 382, 18, GLASS.centerX, 456, 286);
        innerDepth.addColorStop(0, "rgba(216,243,246,0.05)");
        innerDepth.addColorStop(0.58, "rgba(84,199,217,0.018)");
        innerDepth.addColorStop(1, "rgba(0,7,12,0.10)");
        ctx.fillStyle = innerDepth;
        ctx.fillRect(GLASS.left, GLASS.topY, GLASS.right - GLASS.left, GLASS.bottomY - GLASS.topY);

        drawSurgeField(ctx);
        drawSettledBloom(ctx);
        drawCoralFocus(ctx);
        drawMotes(ctx);
        drawFireflies(ctx);
      });
    }

    function drawSurgeField(ctx) {
      if (motion.mode !== "SURGE") return;
      const life = Math.max(0, 1 - motion.elapsed / (motion.duration + motion.maxDelay));
      const radius = 10 + Math.min(motion.elapsed / motion.duration, 1) * 190;
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      const touchHalo = ctx.createRadialGradient(motion.touchX, motion.touchY, 2, motion.touchX, motion.touchY, 48 + radius * 0.14);
      touchHalo.addColorStop(0, `rgba(255,117,106,${0.22 + life * 0.28})`);
      touchHalo.addColorStop(0.38, `rgba(112,216,240,${0.08 + life * 0.14})`);
      touchHalo.addColorStop(1, "rgba(112,216,240,0)");
      ctx.fillStyle = touchHalo;
      ctx.fillRect(motion.touchX - 72, motion.touchY - 72, 144, 144);
      ctx.shadowColor = PALETTE.colors.ice;
      ctx.shadowBlur = 10;
      noStroke();
      for (const point of SURGE_WAVE_POINTS) {
        const x = motion.touchX + Math.cos(point.angle) * radius * point.reach;
        const y = motion.touchY + Math.sin(point.angle) * radius * point.reach;
        fill(232, 248, 255, 40 + life * 145);
        circle(x, y, point.size);
      }
      ctx.shadowBlur = 0;
      fill(255, 117, 106, 90 + life * 155);
      circle(motion.touchX, motion.touchY, 9);
      fill(255, 255, 255, 220);
      circle(motion.touchX, motion.touchY, 3);
      ctx.restore();
    }

    function drawSettledBloom(ctx) {
      if (motion.mode !== "SETTLE" && motion.mode !== "QUIET") return;
      const resting = motes.filter((mote) => mote.state === "QUIET");
      if (resting.length === 0 && motion.quietGlow < 0.01) return;

      const centerX = resting.length
        ? resting.reduce((sum, mote) => sum + mote.x, 0) / resting.length
        : GLASS.centerX;
      const centerY = resting.length
        ? resting.reduce((sum, mote) => sum + mote.y, 0) / resting.length
        : GLASS.bottomY - 26;
      const breathe = motion.mode === "QUIET" ? 0.92 + Math.sin(frameCount * 0.035) * 0.08 : 1;
      const glow = motion.quietGlow * breathe;

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      const halo = ctx.createRadialGradient(centerX, centerY, 4, centerX, centerY, 118);
      halo.addColorStop(0, `rgba(255,183,168,${0.22 * glow})`);
      halo.addColorStop(0.32, `rgba(160,240,255,${0.18 * glow})`);
      halo.addColorStop(1, "rgba(112,216,240,0)");
      ctx.fillStyle = halo;
      ctx.fillRect(centerX - 120, centerY - 90, 240, 150);

      noStroke();
      for (const mote of resting) {
        fill(232, 248, 255, 55 + glow * 90);
        rect(Math.floor(mote.x - 2), Math.floor(mote.y + mote.s * 0.55 + 3), 4, 2);
      }
      ctx.restore();
    }

    function drawCoralFocus(ctx) {
      if (motion.mode !== "SETTLE" && motion.mode !== "QUIET") return;
      const focus = motes.find((mote) => mote.c === "coral");
      const focusX = focus ? focus.x : 360;
      const focusY = focus ? focus.y : 421;
      const glow = ctx.createRadialGradient(focusX, focusY, 3, focusX, focusY, 72);
      glow.addColorStop(0, "rgba(255,117,106,0.42)");
      glow.addColorStop(0.38, "rgba(255,183,168,0.18)");
      glow.addColorStop(1, "rgba(255,183,168,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(focusX - 76, focusY - 76, 152, 152);
    }

    function drawMotes(ctx) {
      const dt = Math.min(deltaTime * 0.001, 0.034);
      updateThoughtFragments(ctx, dt);
      updateRestlessMotes(ctx, dt);
      const reveal = motion.mode === "QUIET"
        ? 1
        : motion.mode === "SETTLE"
          ? Math.min(motion.settleElapsed / 1.25, 1)
          : 0;
      if (reveal <= 0) return;
      noStroke();
      for (const mote of motes) {
        const color = PALETTE.colors[mote.c];
        ctx.save();
        ctx.globalAlpha = reveal;
        fill(color + "66");
        rect(
          Math.floor(mote.x - mote.vx * 0.075 - 2),
          Math.floor(mote.y - mote.vy * 0.075 - 2),
          4,
          4
        );
        ctx.shadowColor = color;
        ctx.shadowBlur = (mote.c === "coral" ? 16 : 9) + mote.energy * 14;
        fill(color);
        rect(Math.floor(mote.x - mote.s / 2), Math.floor(mote.y - mote.s / 2), mote.s, mote.s);
        ctx.shadowBlur = 0;
        fill(255, 255, 255, 215);
        rect(Math.floor(mote.x - mote.s / 2) + 1, Math.floor(mote.y - mote.s / 2) + 1, 2, 2);
        ctx.restore();
      }
    }

    function updateRestlessMotes(ctx, dt) {
      if (motion.mode === "SURGE") {
        updateSurgeMotes(ctx, dt);
        return;
      }
      if (motion.mode === "SETTLE") {
        updateSettlingMotes(ctx, dt);
        return;
      }
      if (motion.mode === "QUIET") {
        updateQuietMotes(dt);
        return;
      }
      for (const mote of motes) {
        advanceRestlessMote(ctx, mote, dt);
      }
    }

    function advanceRestlessMote(ctx, mote, dt) {
      const radius = mote.s * 0.8;
      let nextX = mote.x + mote.vx * dt;
      let nextY = mote.y + mote.vy * dt;

      if (!isMoteInside(ctx, nextX, mote.y, radius)) {
        mote.vx *= -1;
        nextX = mote.x + mote.vx * dt;
      }
      if (!isMoteInside(ctx, mote.x, nextY, radius)) {
        mote.vy *= -1;
        nextY = mote.y + mote.vy * dt;
      }
      if (!isMoteInside(ctx, nextX, nextY, radius)) {
        mote.vx *= -1;
        mote.vy *= -1;
        nextX = mote.x + mote.vx * dt;
        nextY = mote.y + mote.vy * dt;
      }
      if (!isMoteInside(ctx, nextX, nextY, radius)) {
        nextX = mote.x;
        nextY = mote.y;
      }

      mote.x = nextX;
      mote.y = nextY;
      mote.energy *= Math.pow(0.86, dt * 60);
      mote.state = "RESTLESS";
    }

    function updateSurgeMotes(ctx, dt) {
      motion.elapsed += dt;
      let activeCount = 0;

      for (const mote of motes) {
        const localTime = motion.elapsed - mote.surgeDelay;
        mote.hold = Math.max(0, mote.hold - dt);
        if (localTime < 0) {
          advanceRestlessMote(ctx, mote, dt);
          mote.surgeX = mote.x;
          mote.surgeY = mote.y;
          mote.state = "WAITING_FOR_SURGE";
          continue;
        }

        const progress = Math.min(localTime / motion.duration, 1);
        if (progress < 1) activeCount += 1;
        const envelope = Math.sin(Math.PI * progress);
        const dx = mote.surgeX - motion.touchX;
        const dy = mote.surgeY - motion.touchY;
        const length = Math.max(1, Math.hypot(dx, dy));
        const nx = dx / length;
        const ny = dy / length;
        const sideWave = Math.sin(TWO_PI * progress) * envelope;
        const push = (10 + 18 * mote.surgeStrength) * envelope;
        const lift = (16 + 14 * mote.surgeStrength) * envelope;
        let nextX = mote.surgeX + nx * push - ny * 5 * mote.surgeStrength * sideWave;
        let nextY = mote.surgeY + ny * push - lift + nx * 5 * mote.surgeStrength * sideWave;

        if (!isMoteInside(ctx, nextX, nextY, mote.s * 0.8)) {
          const offsetX = nextX - mote.surgeX;
          const offsetY = nextY - mote.surgeY;
          let scale = 0.5;
          while (scale >= 0.0625) {
            const testX = mote.surgeX + offsetX * scale;
            const testY = mote.surgeY + offsetY * scale;
            if (isMoteInside(ctx, testX, testY, mote.s * 0.8)) {
              nextX = testX;
              nextY = testY;
              break;
            }
            scale *= 0.5;
          }
          if (scale < 0.0625) {
            nextX = mote.surgeX;
            nextY = mote.surgeY;
          }
        }

        mote.x = nextX;
        mote.y = nextY;
        mote.energy = envelope * mote.surgeStrength;
        mote.state = progress < 1 ? "SURGE" : "RESTLESS";
      }

      if (motion.elapsed >= motion.duration + motion.maxDelay && activeCount === 0) {
        motion.mode = "SETTLE";
        motion.settleElapsed = 0;
        motion.settledCount = 0;
        for (const mote of motes) {
          mote.energy = 0;
          mote.vx *= 0.34;
          mote.vy = 0;
          mote.restTime = 0;
          mote.state = "SETTLE";
        }
        seedMotesFromThoughts();
      }
    }

    function updateSettlingMotes(ctx, dt) {
      motion.settleElapsed += dt;
      let settledCount = 0;

      for (const mote of motes) {
        if (mote.state === "QUIET") {
          settledCount += 1;
          continue;
        }

        const radius = mote.s * 0.8;
        mote.vy += 126 * dt;
        mote.vx *= Math.pow(0.986, dt * 60);
        let nextX = mote.x + mote.vx * dt;
        let nextY = mote.y + mote.vy * dt;

        if (!isMoteInside(ctx, nextX, mote.y, radius)) {
          mote.vx *= -0.46;
          nextX = mote.x + mote.vx * dt;
        }

        if (!isMoteInside(ctx, mote.x, nextY, radius)) {
          const downwardImpact = mote.vy > 0;
          const impactSpeed = Math.abs(mote.vy);
          mote.vx *= 0.72;
          if (downwardImpact && impactSpeed < 24) {
            mote.vy = 0;
            mote.vx *= 0.52;
            mote.restTime += dt * 4;
          } else {
            mote.vy *= -0.34;
            mote.restTime = 0;
          }
          nextY = mote.y + mote.vy * dt;
        } else if (Math.abs(mote.vy) > 28) {
          mote.restTime = 0;
        }

        if (!isMoteInside(ctx, nextX, nextY, radius)) {
          nextX = mote.x;
          nextY = mote.y;
        }

        mote.x = nextX;
        mote.y = nextY;
        mote.energy *= Math.pow(0.9, dt * 60);

        if (mote.restTime >= 0.24 || (motion.settleElapsed > 7.2 && mote.y > GLASS.bottomY - 70)) {
          mote.vx = 0;
          mote.vy = 0;
          mote.energy = 0.28;
          mote.state = "QUIET";
          settledCount += 1;
        }
      }

      motion.settledCount = settledCount;
      const targetGlow = settledCount / motes.length;
      motion.quietGlow += (targetGlow - motion.quietGlow) * (1 - Math.pow(0.92, dt * 60));

      if (settledCount === motes.length) {
        motion.mode = "QUIET";
        motion.quietGlow = 1;
        motion.quietElapsed = 0;
      }
    }

    function updateQuietMotes(dt) {
      motion.quietElapsed += dt;
      motion.quietGlow += (1 - motion.quietGlow) * (1 - Math.pow(0.94, dt * 60));
      for (const mote of motes) {
        mote.energy += (0.28 - mote.energy) * (1 - Math.pow(0.95, dt * 60));
        mote.state = "QUIET";
      }
    }

    function smoothstep01(value) {
      const t = Math.max(0, Math.min(1, value));
      return t * t * (3 - 2 * t);
    }

    function getFireflyState(firefly, time) {
      const appearance = firefly.delay === 0
        ? 0.38 + 0.62 * smoothstep01(time / 0.85)
        : smoothstep01((time - firefly.delay) / 0.85);
      const driftAngle = TWO_PI * firefly.driftSpeed * time + firefly.phase;
      const blink = 0.68
        + Math.sin(TWO_PI * firefly.blinkSpeed * time + firefly.phase) * 0.22
        + Math.sin(TWO_PI * firefly.blinkSpeed * 0.43 * time + firefly.phase * 1.7) * 0.10;
      return {
        x: firefly.x + Math.sin(driftAngle) * firefly.rx,
        y: firefly.y + Math.cos(driftAngle * 0.73 + firefly.phase) * firefly.ry,
        appearance,
        intensity: appearance * Math.max(0.34, Math.min(1, blink))
      };
    }

    function drawFireflies(ctx) {
      if (motion.mode !== "QUIET") return;
      ctx.save();
      ctx.globalCompositeOperation = "lighter";

      for (const firefly of fireflies) {
        const state = getFireflyState(firefly, motion.quietElapsed);
        if (state.appearance <= 0.001) continue;

        const haloRadius = 13 + state.intensity * 9;
        const halo = ctx.createRadialGradient(state.x, state.y, 0, state.x, state.y, haloRadius);
        halo.addColorStop(0, `rgba(255,242,174,${0.28 * state.intensity})`);
        halo.addColorStop(0.36, `rgba(255,215,106,${0.16 * state.intensity})`);
        halo.addColorStop(1, "rgba(255,215,106,0)");
        ctx.fillStyle = halo;
        ctx.fillRect(state.x - haloRadius, state.y - haloRadius, haloRadius * 2, haloRadius * 2);

        ctx.shadowColor = PALETTE.colors.gold;
        ctx.shadowBlur = 8 + state.intensity * 10;
        ctx.globalAlpha = 0.58 + state.intensity * 0.42;
        ctx.fillStyle = PALETTE.colors.gold;
        ctx.beginPath();
        ctx.arc(state.x, state.y, firefly.size * (0.78 + state.intensity * 0.24), 0, TWO_PI);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.globalAlpha = 0.72 + state.intensity * 0.28;
        ctx.fillStyle = PALETTE.colors.goldSoft;
        ctx.beginPath();
        ctx.arc(state.x - 0.45, state.y - 0.45, Math.max(0.8, firefly.size * 0.36), 0, TWO_PI);
        ctx.fill();
      }

      ctx.restore();
    }

    function updateThoughtFragments(ctx, dt) {
      if (motion.mode === "RESTLESS") {
        for (const fragment of thoughtFragments) advanceThoughtFragment(ctx, fragment, dt);
        return;
      }

      if (motion.mode === "SURGE") {
        for (const fragment of thoughtFragments) updateThoughtSurge(ctx, fragment, dt);
        return;
      }

      if (motion.mode === "SETTLE") {
        const dissolve = Math.min(motion.settleElapsed / 1.45, 1);
        for (const fragment of thoughtFragments) {
          fragment.dissolve = dissolve;
          fragment.energy *= Math.pow(0.9, dt * 60);
          fragment.state = dissolve < 1 ? "DISSOLVE" : "GONE";
        }
        return;
      }

      for (const fragment of thoughtFragments) {
        fragment.dissolve = 1;
        fragment.energy = 0;
        fragment.state = "GONE";
      }
    }

    function advanceThoughtFragment(ctx, fragment, dt) {
      let nextX = fragment.x + fragment.vx * dt;
      let nextY = fragment.y + fragment.vy * dt;

      if (!isThoughtInside(ctx, nextX, fragment.y, fragment)) {
        fragment.vx *= -1;
        nextX = fragment.x + fragment.vx * dt;
      }
      if (!isThoughtInside(ctx, fragment.x, nextY, fragment)) {
        fragment.vy *= -1;
        nextY = fragment.y + fragment.vy * dt;
      }
      if (!isThoughtInside(ctx, nextX, nextY, fragment)) {
        fragment.vx *= -1;
        fragment.vy *= -1;
        nextX = fragment.x + fragment.vx * dt;
        nextY = fragment.y + fragment.vy * dt;
      }
      if (!isThoughtInside(ctx, nextX, nextY, fragment)) {
        nextX = fragment.x;
        nextY = fragment.y;
      }

      fragment.x = nextX;
      fragment.y = nextY;
      fragment.energy *= Math.pow(0.88, dt * 60);
      fragment.state = "RESTLESS";
    }

    function updateThoughtSurge(ctx, fragment, dt) {
      const localTime = motion.elapsed - fragment.surgeDelay;
      if (localTime < 0) {
        advanceThoughtFragment(ctx, fragment, dt);
        fragment.surgeX = fragment.x;
        fragment.surgeY = fragment.y;
        fragment.state = "WAITING_FOR_SURGE";
        return;
      }

      const progress = Math.min(localTime / motion.duration, 1);
      const envelope = Math.sin(Math.PI * progress);
      const dx = fragment.surgeX - motion.touchX;
      const dy = fragment.surgeY - motion.touchY;
      const length = Math.max(1, Math.hypot(dx, dy));
      const nx = dx / length;
      const ny = dy / length;
      const sideWave = Math.sin(TWO_PI * progress) * envelope;
      const push = (7 + 13 * fragment.surgeStrength) * envelope;
      const lift = (20 + 11 * fragment.surgeStrength) * envelope;
      let nextX = fragment.surgeX + nx * push - ny * 5 * fragment.surgeStrength * sideWave;
      let nextY = fragment.surgeY + ny * push - lift + nx * 5 * fragment.surgeStrength * sideWave;

      if (!isThoughtInside(ctx, nextX, nextY, fragment)) {
        const offsetX = nextX - fragment.surgeX;
        const offsetY = nextY - fragment.surgeY;
        let scale = 0.5;
        while (scale >= 0.0625) {
          const testX = fragment.surgeX + offsetX * scale;
          const testY = fragment.surgeY + offsetY * scale;
          if (isThoughtInside(ctx, testX, testY, fragment)) {
            nextX = testX;
            nextY = testY;
            break;
          }
          scale *= 0.5;
        }
        if (scale < 0.0625) {
          nextX = fragment.surgeX;
          nextY = fragment.surgeY;
        }
      }

      fragment.x = nextX;
      fragment.y = nextY;
      fragment.energy = envelope * fragment.surgeStrength;
      fragment.state = progress < 1 ? "SURGE" : "READY_TO_DISSOLVE";
    }

    function seedMotesFromThoughts() {
      const colors = ["white", "cyan", "blue", "white"];
      thoughtFragments.forEach((fragment, fragmentIndex) => {
        for (let partIndex = 0; partIndex < 4; partIndex += 1) {
          const mote = motes[fragmentIndex * 4 + partIndex];
          if (!mote) continue;
          const offsetX = (partIndex - 1.5) * (fragment.w / 5);
          mote.x = fragment.x + offsetX;
          mote.y = fragment.y + (partIndex % 2 === 0 ? -3 : 3);
          mote.vx = offsetX * 0.62;
          mote.vy = -8 - (partIndex % 2) * 4;
          mote.c = fragment.warm && partIndex % 2 === 1 ? "coral" : colors[partIndex];
          mote.energy = 0.56;
          mote.restTime = 0;
          mote.state = "SETTLE";
        }
      });
    }

    function renderThoughtFragments() {
      const stage = document.getElementById("pixel-stage");
      stage.classList.toggle("is-quiet", motion.mode === "QUIET");

      for (const fragment of thoughtFragments) {
        if (!fragment.element) continue;
        let opacity = 0.84 + fragment.energy * 0.16;
        if (motion.mode === "SETTLE") opacity = Math.pow(1 - fragment.dissolve, 1.35);
        if (motion.mode === "QUIET") opacity = 0;
        const scale = 1 + fragment.energy * 0.09 + fragment.dissolve * 0.05;
        const glowRadius = 10 + fragment.energy * 24;
        const outerRadius = 20 + fragment.energy * 30;
        const glowAlpha = 0.24 + fragment.energy * 0.58;
        const outerAlpha = fragment.energy * 0.30;
        const glowColor = fragment.warm ? "255,117,106" : "84,199,217";
        const shadowBase = fragment.warm ? "25,7,8" : "1,12,18";
        fragment.element.style.opacity = opacity;
        fragment.element.style.letterSpacing = `${0.04 + fragment.dissolve * 0.34}em`;
        fragment.element.style.filter = `blur(${(fragment.dissolve * 1.8).toFixed(2)}px)`;
        fragment.element.style.textShadow = `0 1px 1px rgba(${shadowBase},0.78), 0 0 ${glowRadius.toFixed(1)}px rgba(${glowColor},${glowAlpha.toFixed(2)}), 0 0 ${outerRadius.toFixed(1)}px rgba(${glowColor},${outerAlpha.toFixed(2)})`;
        fragment.element.style.transform = `translate3d(${fragment.x}px, ${fragment.y}px, 0) translate(-50%, -50%) scale(${scale})`;
      }
    }

    function isThoughtInside(ctx, x, y, fragment) {
      const halfW = fragment.w * 0.5;
      const halfH = fragment.h * 0.5;
      return isPointInEchoBox(x - halfW, y - halfH)
        && isPointInEchoBox(x + halfW, y - halfH)
        && isPointInEchoBox(x - halfW, y + halfH)
        && isPointInEchoBox(x + halfW, y + halfH);
    }

    function isMoteInside(ctx, x, y, radius) {
      return isPointInEchoBox(x - radius, y - radius)
        && isPointInEchoBox(x + radius, y - radius)
        && isPointInEchoBox(x - radius, y + radius)
        && isPointInEchoBox(x + radius, y + radius);
    }

    function drawFrontGlass(ctx) {
      ctx.save();
      defineEchoBoxPath(ctx);
      ctx.clip();
      ctx.globalCompositeOperation = "screen";
