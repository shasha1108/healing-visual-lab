function createGlowTex(inner, outer, size) {
  const c = document.createElement('canvas'); c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  g.addColorStop(0,inner); g.addColorStop(0.2,inner);
  g.addColorStop(0.5,outer); g.addColorStop(1,'transparent');
  ctx.fillStyle = g; ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(c);
}

const TEX_BRIGHT = createGlowTex('rgba(255,255,255,1)','rgba(255,255,255,0.5)',64);

// ── 1. 宇宙音频引擎 ──
let audioCtx, masterGain, breathGain, audioInited = false;
let organNodes = [], currentChordIdx = -1, chordTimer = 0;
const CHORD_DUR = 16;
const CHORDS = [
  [130.81,155.56,196.00,233.08],  // Cm7
  [103.83,130.81,155.56,196.00],  // AbM7
  [77.78,98.00,116.54,146.83],    // EbM7
  [58.27,73.42,87.31,110.00],     // BbM7
];

function stopOrgan() { organNodes.forEach(n=>{try{n.osc.stop()}catch(e){}}); organNodes=[]; }

function playOrganChord(idx) {
  stopOrgan();
  const c = CHORDS[idx], now = audioCtx.currentTime;
  c.forEach(f => {
    [{m:1,g:0.025},{m:3,g:0.01},{m:5,g:0.004}].forEach(p => {
      const o = audioCtx.createOscillator(); o.type='sine';
      const g = audioCtx.createGain();
      o.frequency.setValueAtTime(f*p.m, now);
      g.gain.setValueAtTime(0,now);
      g.gain.linearRampToValueAtTime(p.g, now+0.8);
      g.gain.setValueAtTime(p.g, now+CHORD_DUR-1.5);
      g.gain.linearRampToValueAtTime(0, now+CHORD_DUR);
      o.connect(g).connect(masterGain);
      o.start(now); o.stop(now+CHORD_DUR+0.1);
      organNodes.push({osc:o,gain:g});
    });
  });
}

function initAudio() {
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = audioCtx.createGain(); masterGain.gain.value = 0.4;
  masterGain.connect(audioCtx.destination);

  // 宇宙呼吸底噪 54Hz — gain由10秒breath周期驱动
  const drone = audioCtx.createOscillator(); drone.type='sine';
  drone.frequency.value = 54;
  breathGain = audioCtx.createGain(); breathGain.gain.value = 0;
  drone.connect(breathGain).connect(masterGain);
  drone.start();

  audioInited = true;
  currentChordIdx=0; chordTimer=0;
  playOrganChord(0);
}

function updateOrgan(dt) {
  if(!audioInited) return;
  chordTimer += dt;
  if(chordTimer >= CHORD_DUR) { chordTimer-=CHORD_DUR; currentChordIdx=(currentChordIdx+1)%CHORDS.length; playOrganChord(currentChordIdx); }
}

function playConjunctionChime() {
  if(!audioInited) return;
  const now = audioCtx.currentTime;
  [1046.50,1318.51,1567.98].forEach((f,i) => {
    const o = audioCtx.createOscillator(); o.type='sine';
    const g = audioCtx.createGain();
    o.frequency.setValueAtTime(f, now+i*0.12);
    g.gain.setValueAtTime(0, now+i*0.12);
    g.gain.linearRampToValueAtTime(0.18, now+i*0.12+0.06);
    g.gain.exponentialRampToValueAtTime(0.001, now+i*0.12+3.5);
    o.connect(g).connect(masterGain);
    o.start(now+i*0.12); o.stop(now+i*0.12+3.6);
  });
}

function playColorChime() {
  if(!audioInited) return;
  const now = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); o.type='sine';
  const g = audioCtx.createGain();
  o.frequency.setValueAtTime(1046.5,now);

  g.gain.linearRampToValueAtTime(0.04,now+0.03);
  g.gain.exponentialRampToValueAtTime(0.001,now+1.5);
  o.connect(g).connect(masterGain);
  o.start(now); o.stop(now+1.6);
}

      angle: (i/3)*Math.PI*2 + Math.random(),
      speed: (0.08+Math.random()*0.12)*(Math.random()>0.5?1:-1)

  }
  g.rotation.x=tx; g.rotation.z=tz;
  scene.add(g);
}

  dustPos[i*3+1]=(Math.random()-0.5)*55;
  dustPos[i*3+2]=(Math.random()-0.5)*70;
  const warm=Math.random()>0.5;
  const c=warm?new THREE.Color().setHSL(0.12,0.7,0.4+Math.random()*0.4):new THREE.Color().setHSL(0.6,0.4,0.5+Math.random()*0.3);
  dustCol[i*3]=c.r; dustCol[i*3+1]=c.g; dustCol[i*3+2]=c.b;
  dustData.push({phase:Math.random()*Math.PI*2, dx:(Math.random()-0.5)*0.015, dy:(Math.random()-0.5)*0.01, dz:(Math.random()-0.5)*0.012});
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos,3));
dustGeo.setAttribute('color', new THREE.BufferAttribute(dustCol,3));
const dustPts = new THREE.Points(dustGeo, new THREE.PointsMaterial({
  size:0.2, vertexColors:true, map:TEX_GOLD,
  blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity:0.45
})); scene.add(dustPts);

// 10e. 远方孤灯
const lampGeo = new THREE.BufferGeometry();
lampGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([0,10,-180]),3));
const lamp = new THREE.Points(lampGeo, new THREE.PointsMaterial({
  size:4, color:0xffddaa, map:TEX_GOLD,
  blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity:0.6
})); scene.add(lamp);

// 10f. 流星
const shooters = [];
const MAX_SHOT = 5;
const trailGrp = new THREE.Group(); scene.add(trailGrp);
for(let i=0;i<MAX_SHOT;i++) shooters.push({active:false,life:0,maxLife:60+Math.random()*40,cooldown:Math.random()*200,pos:new THREE.Vector3(),vel:new THREE.Vector3(),trail:[]});

// ── 11. 主循环 ──
let leafSpawnTimer = 0;
const clock = new THREE.Clock();

function render(){
  requestAnimationFrame(render);
  const dt = Math.min(clock.getDelta(), 0.033);
  const time = clock.elapsedTime;
  controls.update();

  // ── 10秒宇宙呼吸周期 ──
  const breath = (Math.sin(time * 0.628) + 1) / 2;
  updateOrgan(dt);

  // 视觉呼吸
  starCloud.material.opacity = 0.2 + breath * 0.5;
  trackHalo.material.opacity = 0.1 + breath * 0.25;
  orbitLines.forEach(l => l.material.opacity = 0.12 + breath * 0.3);
  scene.fog.density = 0.0012 - breath * 0.0005;
  renderer.toneMappingExposure = 1.6 + breath * 0.5;
  dustPts.material.opacity = 0.3 + breath * 0.35;
  waterMat.opacity = 0.3 + breath * 0.3;
  ghost1.children[0].material.opacity = 0.03 + breath * 0.06;
  ghost2.children[0].material.opacity = 0.02 + breath * 0.04;

  // 听觉呼吸
  if (breathGain) breathGain.gain.setTargetAtTime(0.08 + breath * 0.4, audioCtx?audioCtx.currentTime:0, 0.1);

  // ── A. 旅人 ──
  const pathT = (time * 0.04) % 1.0;
  const tPos = curve.getPointAt(pathT);
  traveler.position.copy(tPos);
  haloWire.rotation.x=time*0.4; haloWire.rotation.y=time*0.6;
  core.scale.setScalar(1+Math.sin(time*3)*0.12);
  travLight.intensity = 5 + Math.sin(time*2.5)*2;

  // 交叉点滴答
  const crossD = Math.min(Math.abs(pathT-0.25),Math.abs(pathT-0.75),Math.abs(pathT-0.25+1),Math.abs(pathT-0.75+1));
  if(crossD<0.008){travLight.intensity+=8; orbitLines.forEach(l=>l.material.opacity=0.6);}

  // ── B. 双流粒子 ──
  for(let i=0;i<FLOW_N;i++){
    const fd=flowData[i];
    fd.t+=fd.speed*fd.dir;
    if(fd.t>1)fd.t-=1; if(fd.t<0)fd.t+=1;
    const pt=curve.getPointAt(fd.t);
    flowPos[i*3]=pt.x+(Math.random()-0.5)*0.9;
    flowPos[i*3+1]=pt.y+(Math.random()-0.5)*0.7;
    flowPos[i*3+2]=pt.z+(Math.random()-0.5)*0.9;
    const d2t=Math.abs(fd.t-pathT);
    const heat=d2t<0.12?Math.pow(1-d2t/0.12,2):0;
    flowCol[i*3]=0.45+heat*0.55; flowCol[i*3+1]=0.65+heat*0.3; flowCol[i*3+2]=1.0-heat*0.5;
  }
  flowGeo.attributes.position.needsUpdate=true;
  flowGeo.attributes.color.needsUpdate=true;

  // ── C. 幽灵环旋转 ──
  ghost1.rotation.z+=dt*ghost1.userData.speed*60;
  ghost2.rotation.x+=dt*ghost2.userData.speed*60;

  // ── D. 水面波动 ──
  for(let i=0;i<WATER_N;i++){
    const wd=waterData[i];
    waterPos[i*3+1]=wd.baseY+Math.sin(time*wd.freq+wd.phase)*0.5;
  }
  waterGeo.attributes.position.needsUpdate=true;

  // ── E. 行星运动 + 合相检测 ──
  planets.forEach(p => {
    p.angle += p.speed * 0.01;
    p.group.position.set(Math.cos(p.angle)*p.radius, 0, Math.sin(p.angle)*p.radius);
  });

  if (flashLife <= 0) {
    for(let i=0;i<planets.length;i++){
      for(let j=i+1;j<planets.length;j++){
        const p1 = new THREE.Vector3().setFromMatrixPosition(planets[i].group.matrixWorld);
        const p2 = new THREE.Vector3().setFromMatrixPosition(planets[j].group.matrixWorld);
        if (p1.distanceTo(p2) < 7.0) {
          flashLife = 2.0;
          flashSprite.position.copy(p1.lerp(p2, 0.5));
          playConjunctionChime();
          break;
        }
      }
      if (flashLife>0) break;
    }
  }
  if (flashLife > 0) {
    flashLife -= dt;
    flashSprite.material.opacity = Math.max(0, flashLife/2.0);
    const s = 18 + (2.0-flashLife)*18;
    flashSprite.scale.set(s,s,1);
  }

  // ── F. 时间字符剥落 ──
  leafSpawnTimer += dt;
  if (leafSpawnTimer > 0.2) {
    leafSpawnTimer = 0;
    const l = leaves[leafIdx];
    l.active=true; l.life=0; l._chimeDone=false;
    l.mesh.position.copy(tPos);
    l.mesh.position.x+=(Math.random()-0.5)*1.5;
    l.mesh.position.y+=(Math.random()-0.5)*1.2+0.5;
    l.mesh.position.z+=(Math.random()-0.5)*1.5;
    l.mesh.visible=true;
    l.mesh.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);
    l.mesh.material = charMats[leafIdx % charMats.length].clone();
    l.fallSpeed=0.012+Math.random()*0.028;
    leafIdx=(leafIdx+1)%MAX_LEAVES;
  }

  for(let i=0;i<MAX_LEAVES;i++){
    const l=leaves[i];
    if(!l.active) continue;
    l.life++;
    const prog=l.life/l.maxLife;
    if(prog>=1.0){l.active=false;l.mesh.visible=false;continue;}

    l.mesh.rotation.x+=l.rotX; l.mesh.rotation.y+=l.rotY; l.mesh.rotation.z+=l.rotZ;
    l.mesh.position.y-=l.fallSpeed*(1+prog*1.5);
    l.mesh.position.x+=Math.sin(time*l.swayF+l.swayP)*l.swayA*0.03;
    l.mesh.position.z+=Math.cos(time*l.swayF*0.7+l.swayP)*l.swayA*0.02;

    l.upTimer+=dt;
    if(l.upTimer>l.upThresh&&prog<0.6){l.upTimer=0;l.upThresh=3+Math.random()*6;l.mesh.position.y+=0.4+Math.random()*0.6;}

    const col=l.mesh.material.color;
    const prevP=(l.life-1)/l.maxLife;
    if(prog<0.2)col.copy(cGold).lerp(cCoral,prog/0.2);
    else if(prog<0.6)col.copy(cCoral).lerp(cDeepBlue,(prog-0.2)/0.4);
    else col.copy(cDeepBlue);
    if(prevP<0.2&&prog>=0.2&&!l._chimeDone){l._chimeDone=true;playColorChime();}

    let alpha;
    if(prog<0.15)alpha=prog/0.15*0.95;
    else if(prog<0.7)alpha=0.95;
    else alpha=(1-prog)/0.3*0.95;
    l.mesh.material.opacity=alpha;
  }

  // ── G. 背景动态 ──
  starCloud.rotation.y+=dt*0.01;
  nebula.rotation.y+=dt*0.008; nebula.rotation.x+=dt*0.003;
  neonPts.rotation.y+=dt*0.02;

  for(let i=0;i<NEON_N;i++){
    const nd=neonData[i];
    const hue=(nd.hue+time*0.03)%1;
    const a=nd.baseA+Math.sin(time*nd.freq+nd.phase)*0.4;
    const c=new THREE.Color().setHSL(hue,0.9,0.5+a*0.3);
    neonCol[i*3]=c.r; neonCol[i*3+1]=c.g; neonCol[i*3+2]=c.b;
    neonPos[i*3+1]+=Math.sin(time*2+nd.phase)*0.008;
  }
  neonGeo.attributes.position.needsUpdate=true;
  neonGeo.attributes.color.needsUpdate=true;

  for(let i=0;i<DUST_N;i++){
    dustPos[i*3]+=dustData[i].dx;
    dustPos[i*3+1]+=dustData[i].dy;
    dustPos[i*3+2]+=dustData[i].dz;
    if(Math.abs(dustPos[i*3])>45)dustPos[i*3]*=-1;
    if(Math.abs(dustPos[i*3+1])>28)dustPos[i*3+1]*=-1;
    if(Math.abs(dustPos[i*3+2])>35)dustPos[i*3+2]*=-1;
  }
  dustGeo.attributes.position.needsUpdate=true;

  lamp.material.opacity = 0.45 + Math.sin(time*0.5)*0.2;

  // ── H. 流星 ──
  for(let i=0;i<MAX_SHOT;i++){
    const s=shooters[i];
    if(s.active){s.life++; if(s.life>s.maxLife){s.active=false;continue;} s.pos.add(s.vel); s.trail.push(s.pos.clone()); if(s.trail.length>25)s.trail.shift();}
    else{s.cooldown-=dt; if(s.cooldown<=0){s.active=true;s.life=0;s.cooldown=60+Math.random()*200; s.pos.set((Math.random()-0.5)*80,20+Math.random()*40,-30-Math.random()*40); s.vel.set((Math.random()-0.5)*0.3,-0.2-Math.random()*0.4,(Math.random()-0.5)*0.2); s.trail=[s.pos.clone()];}}
  }
  trailGrp.clear();
  for(let i=0;i<MAX_SHOT;i++){
    const s=shooters[i];
    if(!s.active||s.trail.length<2)continue;
    const pts=s.trail.map(p=>[p.x,p.y,p.z]).flat();
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.BufferAttribute(new Float32Array(pts),3));
    trailGrp.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.55,blending:THREE.AdditiveBlending,depthWrite:false})));
  }

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  const w=stage.clientWidth, h=stage.clientHeight;
  camera.aspect=w/h; camera.updateProjectionMatrix();
  renderer.setSize(w,h);
});

render();

// ── 自定义光标 ──
(function(){
  const c={x:0,y:0,tx:0,ty:0};
  const el=document.getElementById('spirit-cursor');
  document.addEventListener('mousemove',e=>{
    if(el.style.opacity==='0'){el.style.opacity='1';c.x=e.clientX;c.y=e.clientY;}
    c.tx=e.clientX;c.ty=e.clientY;
  });
  (function u(){c.x+=(c.tx-c.x)*0.1;c.y+=(c.ty-c.y)*0.1;el.style.transform=`translate(${c.x-12}px,${c.y-12}px)`;requestAnimationFrame(u);})();
})();
</script>
</body>
</html>
